server {
    listen 4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — required for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxies (mirrors vite.config.js dev proxies) ────────────────────

    # PVWATTS / NLR
    location /api/pvwatts/ {
        rewrite ^/api/pvwatts/v8\.json$ /api/pvwatts/v8 break;
        rewrite ^/api/pvwatts/(.*)$ /api/pvwatts/$1 break;
        proxy_pass https://developer.nlr.gov;
        proxy_ssl_server_name on;
        proxy_set_header Host developer.nlr.gov;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # NASA POWER
    location /api/nasa/ {
        rewrite ^/api/nasa/(.*)$ /api/$1 break;
        proxy_pass https://power.larc.nasa.gov;
        proxy_ssl_server_name on;
        proxy_set_header Host power.larc.nasa.gov;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Open-Meteo (forecast)
    location /api/openmeteo/ {
        rewrite ^/api/openmeteo/(.*)$ /$1 break;
        proxy_pass https://api.open-meteo.com;
        proxy_ssl_server_name on;
        proxy_set_header Host api.open-meteo.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Open-Meteo Archive (ERA5)
    location /api/meteo-archive/ {
        rewrite ^/api/meteo-archive/(.*)$ /$1 break;
        proxy_pass https://archive-api.open-meteo.com;
        proxy_ssl_server_name on;
        proxy_set_header Host archive-api.open-meteo.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Overpass API
    location /api/overpass/ {
        rewrite ^/api/overpass/(.*)$ /api/$1 break;
        proxy_pass https://overpass-api.de;
        proxy_ssl_server_name on;
        proxy_set_header Host overpass-api.de;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
