    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Myanmar Power Grid</title>
    <style>
      body {

        min-height: 100vh;

        color: #94a3b8;

  <body>
    <main>
      <h1>Offline</h1>
